services:
  db:
    image: postgres:16
    container_name: agendex-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: agendex
      POSTGRES_USER: agendex
      POSTGRES_PASSWORD: agendex
    ports:
      - "5432:5432"
    volumes:
      - agendex_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agendex -d agendex"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: AgendeX.WebAPI/Dockerfile
    container_name: agendex-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Api__Port: 5150
      ConnectionStrings__Default: Host=db;Port=5432;Database=agendex;Username=agendex;Password=agendex
      Jwt__Issuer: AgendeX
      Jwt__Audience: AgendeX.Clients
      Jwt__AccessTokenMinutes: 15
      Jwt__RefreshTokenDays: 7
      AdminSeed__Enabled: "true"
      AdminSeed__Name: Admin
      AdminSeed__Email: admin@agendex.local
      AdminSeed__Password: criar@123
    ports:
      - "5150:5150"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agendex-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_BASE_URL: http://localhost:5150
    ports:
      - "5173:80"

volumes:
  agendex_pgdata:
